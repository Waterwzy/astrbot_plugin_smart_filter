name : format check

on : 
  push : 
    branches : [master]
  pull_request :
    branches : ['master']

jobs :
  check_format :
    runs-on : ubuntu-latest
    steps :
      - uses : actions/checkout@v5
      - uses : actions/setup-python@v6
      - name : install ruff
        run : pip install ruff
      - name : ruff check
        run : |
          ruff format --check .
          ruff check .